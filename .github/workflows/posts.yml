name: Rebuild on new post

# Runs whenever you add or edit a markdown post, so you never have to
# touch data/posts.json by hand.
on:
  push:
    paths:
      - "posts/**.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: content
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild index + RSS
        run: python scripts/build_site.py

      - name: Commit
        run: |
          git config user.name  "digest-bot"
          git config user.email "actions@github.com"
          git add data feed.xml
          git diff --staged --quiet || git commit -m "Rebuild post index"
          git push
